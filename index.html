<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lake Pro</title>
    <meta name="description" content="Lake Pro wake-sports conditions.">
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="src/forecast/styles.css">
  </head>
  <body>
    <main class="shell">
      <nav class="top-nav" aria-label="Site navigation">
        <a class="brand-link" href="./">
          <img src="assets/logo.png" alt="Lake Pro">
        </a>
        <div class="spot-switcher">
          <label for="spotSelect">Lake</label>
          <select id="spotSelect" aria-label="Lake spot"></select>
        </div>
      </nav>

      <section class="map-panel" aria-label="Lake conditions map">
        <div class="timelapse-control" aria-label="Wind timelapse">
          <button id="windBackButton" type="button" aria-label="Previous wind forecast day">Back</button>
          <button id="windPlayButton" type="button">Play</button>
          <input id="windFrameSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Wind forecast time">
          <button id="windForwardButton" type="button" aria-label="Next wind forecast day">Forward</button>
          <strong id="windFrameLabel">Wind timeline pending</strong>
        </div>
        <div id="map" class="map"></div>
      </section>

      <section class="report-card" aria-label="Current lake report">
        <div class="verdict-location">
          <span class="pin" aria-hidden="true"></span>
          <div>
            <strong id="spotName">Lake spot</strong>
            <span id="spotLocation">Location</span>
          </div>
        </div>

        <div class="verdict-main">
          <div class="condition-grade-metric">
            <span>Boating Conditions</span>
            <strong id="conditionGrade" class="grade-letter">--</strong>
          </div>
          <div class="surface-chop-metric">
            <span>Surface Chop</span>
            <b id="conditionSummary">Rating pending</b>
          </div>
        </div>
        <div class="score-track" aria-hidden="true"><span id="scoreFill"></span></div>
      </section>

      <section class="camera-card" id="cameraCard" aria-labelledby="cameraTitle">
        <div class="section-heading">
          <div>
            <h2 id="cameraTitle">Mile High Marina Camera</h2>
            <p>Current Payette Lake marina view</p>
          </div>
          <a href="https://milehighmarina.com/webcams/" target="_blank" rel="noopener">Source</a>
        </div>
        <img src="assets/mile-high-marina-camera.png" alt="Mile High Marina webcam screenshot over Payette Lake">
      </section>

      <section class="ten-day-card" aria-labelledby="forecastTitle">
        <div class="section-heading">
          <div>
            <h2 id="forecastTitle">10 Day Forecast</h2>
            <p>Lake conditions outlook</p>
          </div>
        </div>
        <div class="forecast-strip" id="forecastStrip" aria-label="10 day forecast placeholders"></div>
      </section>

      <section class="wind-card" aria-labelledby="windTitle">
        <div class="section-heading">
          <div>
            <h2 id="windTitle">Wind Speed</h2>
            <p>Today by hour</p>
          </div>
        </div>
        <div class="wind-placeholder" aria-label="Today wind speed chart">
          <span>Wind pending</span>
        </div>
      </section>

      <section class="rating-card" aria-labelledby="ratingTitle">
        <h2 id="ratingTitle">Rating System</h2>
        <div class="rating-grid">
          <div><strong class="grade-letter" data-grade="A">A</strong><span>Excellent</span></div>
          <div><strong class="grade-letter" data-grade="B">B</strong><span>Good</span></div>
          <div><strong class="grade-letter" data-grade="C">C</strong><span>Okay</span></div>
          <div><strong class="grade-letter" data-grade="D">D</strong><span>Marginal</span></div>
          <div><strong class="grade-letter" data-grade="F">F</strong><span>Avoid</span></div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="src/forecast/app.js"></script>
  </body>
</html>
