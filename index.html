<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lake Pro</title>
    <meta name="description" content="Lake Pro wake-sports conditions.">
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="src/forecast/styles.css">
  </head>
  <body>
    <main class="shell">
      <nav class="top-nav" aria-label="Site navigation">
        <a class="brand-link" href="./">
          <img src="assets/logo.png" alt="Lake Pro">
        </a>
        <div class="spot-switcher">
          <select id="spotSelect" aria-label="Lake spot"></select>
        </div>
      </nav>

      <section class="home-dashboard" aria-label="Lake Pro live conditions">
        <section class="camera-card" id="cameraCard" aria-labelledby="cameraTitle">
          <div class="section-heading">
            <div>
              <h2 id="cameraTitle">Mile High Marina Camera</h2>
              <p id="cameraDescription">Current Payette Lake marina view</p>
            </div>
            <a id="cameraSource" href="https://milehighmarina.com/webcams/" target="_blank" rel="noopener">Source</a>
          </div>
          <div class="camera-frame">
            <img id="cameraImage" src="assets/mile-high-marina-camera.png" alt="Mile High Marina webcam screenshot over Payette Lake">
            <span class="camera-live-pill"><i aria-hidden="true"></i>Live</span>
            <strong id="cameraLocationOverlay">Payette Lake</strong>
          </div>
        </section>

        <section class="ten-day-card" aria-labelledby="forecastTitle">
          <div class="section-heading">
            <div>
              <h2 id="forecastTitle">10 Day Forecast</h2>
              <p>Lake conditions outlook</p>
            </div>
          </div>
          <div class="forecast-strip" id="forecastStrip" aria-label="10 day forecast placeholders"></div>
          <div class="forecast-reports" id="forecastReports" aria-label="Written lake forecasts"></div>
        </section>

      </section>

      <section class="map-panel" aria-label="Lake conditions map">
        <div class="map-stage">
          <div id="map" class="map"></div>
          <div class="report-card map-report-bubble" aria-label="Current lake report">
            <div class="verdict-location">
              <span class="pin" aria-hidden="true"></span>
              <div>
                <strong id="spotName">Lake spot</strong>
                <span id="spotLocation">Location</span>
              </div>
            </div>

            <div class="verdict-main">
              <div class="condition-grade-metric">
                <span><span class="badge-label-full">Boating </span>Conditions</span>
                <strong id="conditionGrade" class="grade-letter">--</strong>
              </div>
            </div>
            <div class="score-track" aria-hidden="true"><span id="scoreFill"></span></div>
          </div>
        </div>
        <div class="timelapse-control" aria-label="Wind timelapse">
          <button id="windBackButton" class="timeline-day-button" type="button" aria-label="Previous wind forecast day">Prev day</button>
          <button id="windPlayButton" class="timeline-play-button" type="button" aria-label="Play wind timeline"><span>Play</span></button>
          <input id="windFrameSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Wind forecast time">
          <button id="windForwardButton" class="timeline-day-button" type="button" aria-label="Next wind forecast day">Next day</button>
          <strong id="windFrameLabel">Wind timeline pending</strong>
        </div>
      </section>

      <section class="rating-card" aria-labelledby="ratingTitle">
        <h2 id="ratingTitle">Rating System</h2>
        <div class="rating-grid">
          <div><strong class="grade-letter" data-grade="A">A</strong><span>Epic</span></div>
          <div><strong class="grade-letter" data-grade="B">B</strong><span>Fair</span></div>
          <div><strong class="grade-letter" data-grade="C">C</strong><span>Below average</span></div>
          <div><strong class="grade-letter" data-grade="D">D</strong><span>Poor</span></div>
          <div><strong class="grade-letter" data-grade="F">F</strong><span>Avoid</span></div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="src/forecast/app.js"></script>
  </body>
</html>
